<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <meta name="theme-color" content="#3A7A8C" />

    <!-- PWA / Apple -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="滇途" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Splash screens for common iPhone sizes -->
    <link rel="apple-touch-startup-image"
      media="(device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3)"
      href="/splash/splash-390.png" />
    <link rel="apple-touch-startup-image"
      media="(device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3)"
      href="/splash/splash-375.png" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <title>滇途 — 云南旅游规划</title>

    <style>
      /* Prevent double-tap zoom, tap highlight flashes. Keep text selection enabled
         globally — disabling it breaks scroll propagation on some iOS versions. */
      html { -webkit-text-size-adjust: 100%; overscroll-behavior: none; }
      body { overscroll-behavior: none; -webkit-tap-highlight-color: transparent; }
      /* Only drag handles / interactive non-text buttons should disable selection */
      .no-select { -webkit-user-select: none; user-select: none; -webkit-touch-callout: none; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
